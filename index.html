<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Thai Consonant Mastery Drill</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
width:95%;
max-width:500px;
padding:40px 30px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
text-align:center;
}

.subtitle{
font-size:26px;
font-weight:bold;
margin-bottom:20px;
}

.stats{
display:flex;
justify-content:space-between;
font-size:14px;
margin-bottom:10px;
color:#ff3399;
font-weight:bold;
}

.consonant{
font-size:110px;
margin:20px 0;
font-weight:bold;
}

.options button{
display:block;
margin:10px auto;
padding:14px;
font-size:16px;
width:100%;
border:none;
border-radius:12px;
cursor:pointer;
background:#ffe6f0;
transition:0.2s;
}

.options button:hover{
background:#ff66a3;
color:white;
}

.message{
font-size:16px;
margin-top:10px;
height:24px;
}

.primary{
margin-top:20px;
padding:12px 24px;
border:none;
border-radius:30px;
background:#ff66a3;
color:white;
font-size:16px;
cursor:pointer;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<div class="card">

<!-- START SCREEN -->

<div id="startScreen">

<div class="subtitle">CSII Team Caviar Presents</div>

<input id="nickname" placeholder="Enter nickname"
style="padding:10px;border-radius:8px;border:1px solid #ccc">

<br><br>

<button class="primary" onclick="startGame()">Start Quiz</button>

</div>


<!-- GAME SCREEN -->

<div id="gameScreen" class="hidden">

<div id="player"></div>
<div id="backendStreak"></div>

<div class="stats">
<div>❤️ Lives: <span id="lives">3</span></div>
<div>📚 Progress: <span id="progress">0</span>/44</div>
</div>

<div>🔥 Current Streak: <span id="streak">0</span></div>
<div>🏆 Best Streak: <span id="best">0</span></div>

<div class="consonant" id="consonant"></div>

<div class="options" id="options"></div>

<div class="message" id="message"></div>

<button id="restart" class="primary hidden" onclick="restartGame()">Restart</button>

</div>

</div>

<script>

const consonants = [
{letter:"ก",answer:"ko kai"},
{letter:"ข",answer:"kho khai"},
{letter:"ฃ",answer:"kho khuat"},
{letter:"ค",answer:"kho khwai"},
{letter:"ฅ",answer:"kho khon"},
{letter:"ฆ",answer:"kho rakhang"},
{letter:"ง",answer:"ngo ngu"},
{letter:"จ",answer:"cho chan"},
{letter:"ฉ",answer:"cho ching"},
{letter:"ช",answer:"cho chang"},
{letter:"ซ",answer:"so so"},
{letter:"ฌ",answer:"cho choe"},
{letter:"ญ",answer:"yo ying"},
{letter:"ฎ",answer:"do chada"},
{letter:"ฏ",answer:"to patak"},
{letter:"ฐ",answer:"tho than"},
{letter:"ฑ",answer:"tho nangmontho"},
{letter:"ฒ",answer:"tho phuthao"},
{letter:"ณ",answer:"no nen"},
{letter:"ด",answer:"do dek"},
{letter:"ต",answer:"to tao"},
{letter:"ถ",answer:"tho thung"},
{letter:"ท",answer:"tho thahan"},
{letter:"ธ",answer:"tho thong"},
{letter:"น",answer:"no nu"},
{letter:"บ",answer:"bo baimai"},
{letter:"ป",answer:"po pla"},
{letter:"ผ",answer:"pho phueng"},
{letter:"ฝ",answer:"fo fa"},
{letter:"พ",answer:"pho phan"},
{letter:"ฟ",answer:"fo fan"},
{letter:"ภ",answer:"pho samphao"},
{letter:"ม",answer:"mo ma"},
{letter:"ย",answer:"yo yak"},
{letter:"ร",answer:"ro rua"},
{letter:"ล",answer:"lo ling"},
{letter:"ว",answer:"wo waen"},
{letter:"ศ",answer:"so sala"},
{letter:"ษ",answer:"so ruesi"},
{letter:"ส",answer:"so suea"},
{letter:"ห",answer:"ho hip"},
{letter:"ฬ",answer:"lo chula"},
{letter:"อ",answer:"o ang"},
{letter:"ฮ",answer:"ho nokhuk"}
];

let shuffled=[]
let currentIndex=0
let lives=3

let streak=0
let best=0

function shuffle(a){
return a.sort(()=>Math.random()-0.5)
}

function startGame(){

let nickname=document.getElementById("nickname").value

document.getElementById("player").textContent="Player: "+nickname

/* BACKEND CALL */

fetch("https://YOURSITE-service.onrender.com/start/"+nickname)
.then(r=>r.json())
.then(data=>{
document.getElementById("backendStreak").textContent=
"🔥 Daily Streak: "+data.counter
})

document.getElementById("startScreen").classList.add("hidden")
document.getElementById("gameScreen").classList.remove("hidden")

shuffled=shuffle([...consonants])
currentIndex=0
lives=3
streak=0
best=0

updateUI()
showQuestion()

}

function updateUI(){

document.getElementById("lives").textContent=lives
document.getElementById("progress").textContent=currentIndex

document.getElementById("streak").textContent=streak
document.getElementById("best").textContent=best

}

function showQuestion(){

if(currentIndex>=shuffled.length){
victory()
return
}

let current=shuffled[currentIndex]

document.getElementById("consonant").textContent=current.letter

let options=[current.answer]

while(options.length<4){

let rand=consonants[Math.floor(Math.random()*consonants.length)].answer

if(!options.includes(rand)) options.push(rand)

}

options=shuffle(options)

let optionsDiv=document.getElementById("options")
optionsDiv.innerHTML=""

options.forEach(option=>{

let btn=document.createElement("button")
btn.textContent=option

btn.onclick=()=>checkAnswer(option)

optionsDiv.appendChild(btn)

})

}

function checkAnswer(selected){

let correct=shuffled[currentIndex].answer

if(selected===correct){

streak++

if(streak>best) best=streak

currentIndex++

document.getElementById("message").textContent="✅ Correct!"

updateUI()
showQuestion()

}

else{

lives--
streak=0

document.getElementById("message").textContent="❌ Wrong! Correct: "+correct

updateUI()

if(lives<=0) gameOver()

}

}

function gameOver(){

document.getElementById("options").innerHTML=""
document.getElementById("consonant").textContent="💀"

document.getElementById("message").textContent="Game Over"

document.getElementById("restart").classList.remove("hidden")

}

function victory(){

document.getElementById("options").innerHTML=""
document.getElementById("consonant").textContent="🎉"

document.getElementById("message").textContent="You mastered all Thai consonants!"

document.getElementById("restart").classList.remove("hidden")

}

function restartGame(){
location.reload()
}

</script>

</body>
</html>
